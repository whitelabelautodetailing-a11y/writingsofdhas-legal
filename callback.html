<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization Complete — Writings of Dhas Poster</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 640px;
         margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; text-align: center; }
  .code { font-family: ui-monospace, Consolas, monospace; background: #f2f2f2;
          padding: 14px; border-radius: 8px; word-break: break-all; margin: 16px 0; font-size: 0.95rem; }
  button { font-size: 1rem; padding: 10px 18px; border-radius: 8px; border: 1px solid #888;
           background: #fff; cursor: pointer; }
  .ok { color: #138000; } .err { color: #c00; }
</style>
</head>
<body>
<h1>Authorization received</h1>
<p>Copy the code below and paste it back into the app.</p>
<div class="code" id="code">…reading…</div>
<button onclick="copyCode()">Copy code</button>
<p id="msg"></p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  const el = document.getElementById('code');
  if (error) {
    el.textContent = 'Error: ' + error + ' — ' + (params.get('error_description') || '');
    el.className = 'code err';
  } else if (code) {
    el.textContent = code;
  } else {
    el.textContent = 'No code found in the URL.';
    el.className = 'code err';
  }
  function copyCode() {
    if (!code) return;
    navigator.clipboard.writeText(code).then(() => {
      document.getElementById('msg').textContent = 'Copied!';
      document.getElementById('msg').className = 'ok';
    });
  }
</script>
</body>
</html>
